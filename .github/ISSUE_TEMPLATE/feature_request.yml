name: ✨ 功能請求
description: 提出新功能或改進建議
title: "[Feature]: "
labels: ["enhancement", "待評估"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        感謝你的建議！好的想法讓產品更好 🚀

  - type: dropdown
    id: feature-type
    attributes:
      label: 🏷️ 功能類型
      description: 這個請求屬於哪種類型？
      options:
        - 🆕 新功能 - 全新的功能
        - 🔧 改進 - 改善現有功能
        - 🎨 UI/UX - 介面或體驗優化
        - ⚡ 效能 - 效能提升
        - 🔒 安全性 - 安全相關改進
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: 📊 優先程度
      description: 你認為這個功能的重要性
      options:
        - 🟢 低 - 有的話很好
        - 🟡 中 - 會明顯改善體驗
        - 🔴 高 - 非常需要這個功能
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: 🤔 問題描述
      description: 這個功能要解決什麼問題？
      placeholder: |
        描述你遇到的問題或痛點...
        例如：每次我想要 [...] 的時候，都必須 [...]，這讓我感到很困擾。
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 💡 建議方案
      description: 你希望如何解決這個問題？
      placeholder: |
        描述你理想中的解決方案...
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 🔄 替代方案
      description: 你有考慮過其他解決方式嗎？
      placeholder: |
        描述你考慮過的其他方案...

  - type: textarea
    id: mockup
    attributes:
      label: 🎨 設計稿 / 參考
      description: 如果有設計稿、截圖或參考連結，請附上
      placeholder: 拖曳圖片到這裡或貼上連結...

  - type: dropdown
    id: scope
    attributes:
      label: 📱 影響範圍
      description: 這個功能會影響哪些平台？
      multiple: true
      options:
        - 全平台
        - Android
        - iOS
        - Web
        - Windows
        - macOS
        - Linux

  - type: textarea
    id: additional
    attributes:
      label: 📝 補充說明
      description: 任何其他想補充的資訊
      placeholder: 其他相關資訊...

  - type: checkboxes
    id: contribution
    attributes:
      label: 🤝 貢獻意願
      options:
        - label: 我願意協助實作這個功能
          required: false
        - label: 我願意協助測試這個功能
          required: false
