name: 🐛 Bug 回報
description: 回報程式錯誤或異常行為
title: "[Bug]: "
labels: ["bug", "待分類"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        感謝你花時間回報問題！請盡量詳細填寫以下資訊，幫助我們更快定位問題。

  - type: dropdown
    id: severity
    attributes:
      label: 🔥 嚴重程度
      description: 這個 bug 對你的影響程度
      options:
        - 🟢 輕微 - 不影響主要功能
        - 🟡 中等 - 影響部分功能但有替代方案
        - 🔴 嚴重 - 主要功能無法使用
        - 💀 致命 - 應用程式崩潰或資料遺失
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: 📝 問題描述
      description: 清楚描述你遇到的問題
      placeholder: 告訴我們發生了什麼事...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: 🔄 重現步驟
      description: 如何重現這個問題？
      placeholder: |
        1. 前往 '...'
        2. 點擊 '...'
        3. 滾動到 '...'
        4. 看到錯誤
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: ✅ 預期行為
      description: 你預期應該發生什麼？
      placeholder: 描述正確的行為應該是什麼...
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: ❌ 實際行為
      description: 實際發生了什麼？
      placeholder: 描述實際看到的結果...
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: 📸 截圖或錄影
      description: 如果有的話，請附上截圖或錄影幫助說明問題
      placeholder: 拖曳圖片到這裡或貼上連結...

  - type: dropdown
    id: platform
    attributes:
      label: 📱 平台
      description: 在哪個平台遇到問題？
      multiple: true
      options:
        - Android
        - iOS
        - Web
        - Windows
        - macOS
        - Linux
    validations:
      required: true

  - type: input
    id: flutter-version
    attributes:
      label: 🐦 Flutter 版本
      description: 執行 `flutter --version` 取得
      placeholder: "例如: 3.24.0"

  - type: input
    id: device
    attributes:
      label: 📲 裝置資訊
      description: 裝置型號和系統版本
      placeholder: "例如: iPhone 15 Pro (iOS 17.2) / Pixel 8 (Android 14)"

  - type: textarea
    id: logs
    attributes:
      label: 📋 錯誤日誌
      description: 如果有錯誤訊息，請貼在這裡
      render: shell
      placeholder: |
        貼上相關的錯誤日誌...

  - type: textarea
    id: additional
    attributes:
      label: 💡 其他資訊
      description: 任何其他可能有幫助的資訊
      placeholder: 其他你認為相關的資訊...

  - type: checkboxes
    id: checklist
    attributes:
      label: ✔️ 確認事項
      options:
        - label: 我已搜尋過現有的 Issues，確認這不是重複的問題
          required: true
        - label: 我已更新到最新版本，問題仍然存在
          required: false
