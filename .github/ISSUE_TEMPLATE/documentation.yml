name: 📚 文件改進
description: 回報文件錯誤或建議改進
title: "[Docs]: "
labels: ["documentation"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        好的文件讓大家都受益！感謝你幫助改進文件 📖

  - type: dropdown
    id: doc-type
    attributes:
      label: 📄 文件類型
      description: 這是關於哪種文件？
      options:
        - README
        - API 文件
        - 程式碼註解
        - 教學 / 指南
        - 其他
    validations:
      required: true

  - type: dropdown
    id: issue-type
    attributes:
      label: 🔍 問題類型
      description: 這是什麼類型的問題？
      options:
        - ❌ 錯誤 - 內容有誤
        - 🕳️ 缺漏 - 缺少重要資訊
        - 😕 不清楚 - 描述不夠清楚
        - 📅 過時 - 內容已過時
        - ✨ 建議 - 新增內容建議
    validations:
      required: true

  - type: input
    id: location
    attributes:
      label: 📍 位置
      description: 文件的位置或連結
      placeholder: "例如: README.md 第 50 行 / docs/api.md"
    validations:
      required: true

  - type: textarea
    id: current
    attributes:
      label: 📝 目前內容
      description: 目前的文件內容（如果適用）
      placeholder: 貼上目前的內容...

  - type: textarea
    id: suggestion
    attributes:
      label: ✏️ 建議修改
      description: 你建議如何修改？
      placeholder: 描述你建議的修改內容...
    validations:
      required: true

  - type: checkboxes
    id: contribution
    attributes:
      label: 🤝 貢獻意願
      options:
        - label: 我願意提交 PR 來修正這個問題
          required: false
